<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <meta name="description" content="Póngase en contacto con Transporte JGT y Timol para consultas, cotizaciones y servicios logísticos en Añelo, Cipolletti y la región de Vaca Muerta.">
    <link rel="canonical" href="https://www.transporte-jgt-timol.com/contacto.html" />
    <link rel="icon" type="image/x-icon" href="icons/jgt-2.webp">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Header -->
    <div data-include="templates/header.html"></div> 
 <main>
            <h1 class="main-title">Contacto</h1>

        <section>
            <div class="container contact-wrapper">
                <!-- Contact Form -->
                <div class="contact-form-container">
                    <h2>Formulario</h2>
                    <form id="contact-form" action="https://formsubmit.co/ptarifa@timolsrl.com" method="POST">
                            <!-- Honeypot anti-spam: si se completa, cancelamos el envío -->
                            <input type="text" id="company" name="company" class="hp-field" autocomplete="organization" tabindex="-1" aria-hidden="true">
                        <div class="form-group">
                            <label for="name">Nombre Completo / Empresa:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Teléfono (Opcional):</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        <div class="form-group">
                            <label for="message">Mensaje:</label>
                            <textarea id="message" name="message" rows="8" placeholder="Escriba su consulta aquí..." required></textarea>
                        </div>
                        <div class="form-group human-check">
                            <input type="checkbox" id="human-check" name="human-check" required>
                            <label for="human-check">No soy un robot</label>
                        </div>
                        <input type="hidden" name="_next" value="https://transporte-jgt-timol.com/gracias.html">
                        <button type="submit" class="cta-button">Enviar Mensaje</button>
                        <p id="form-status" role="alert" aria-live="polite"></p>
                    </form>
                </div>

                <!-- Contact Info -->
                <div class="contact-info-container">
                    <h2>Correos electrónicos</h2>
                        <p>Juan Gabriel Tarifa: </p><p>juangabrieltarifa[at]hotmail.com</p>
                        <p>Gabriel Alejandro Morales: </p><p>gmorales[at]timolsrl.com</p>
                </div>
            </div>
        </section>
    </main>

    <div data-include="templates/footer.html"></div>
    <script src="js/include.js" ></script>
    <script src="js/script.js"></script>

</body>
</html>
